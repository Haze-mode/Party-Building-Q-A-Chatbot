<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,minimum-scale=1,maximum-scale=1,user-scalable=no" />
    <title>党建知识问答</title>
    <link rel="stylesheet" type="text/css" href="chatCss/chat.css" />
    <style>
        .navbar-actions {
            display: flex;
            gap: 10px;
        }
        .navbar-btn {
            background: #C91F37;
            border: none;
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s;
        }
        .navbar-btn:hover {
            background: #A0182E;
            transform: translateY(-1px);
        }
        .user-info {
            color: white;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .menu-dropdown {
            position: relative;
            display: inline-block;
        }
        .menu-content {
            display: none;
            position: absolute;
            right: 0;
            top: 100%;
            background: white;
            min-width: 160px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
            border-radius: 4px;
            z-index: 1000;
            margin-top: 5px;
        }
        .menu-content.show {
            display: block;
        }
        .menu-item {
            padding: 12px 16px;
            cursor: pointer;
            color: #333;
            transition: background 0.2s;
        }
        .menu-item:hover {
            background: #f5f5f5;
        }
        .modal {
            display: none;
            position: fixed;
            z-index: 2000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
        }
        .modal-content {
            background-color: white;
            margin: 10% auto;
            padding: 20px;
            border-radius: 8px;
            width: 90%;
            max-width: 600px;
            max-height: 70vh;
            overflow-y: auto;
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #eee;
        }
        .modal-title {
            font-size: 20px;
            color: #333;
        }
        .close-btn {
            font-size: 28px;
            font-weight: bold;
            color: #aaa;
            cursor: pointer;
            line-height: 1;
        }
        .close-btn:hover {
            color: #333;
        }
        .history-item {
            padding: 12px;
            margin-bottom: 10px;
            background: #f9f9f9;
            border-radius: 6px;
            border-left: 3px solid #667eea;
        }
        .history-question {
            font-weight: bold;
            color: #333;
            margin-bottom: 8px;
        }
        .history-answer {
            color: #666;
            font-size: 14px;
            line-height: 1.6;
        }
        .upload-area {
            border: 2px dashed #ddd;
            border-radius: 8px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: border-color 0.3s;
        }
        .upload-area:hover {
            border-color: #667eea;
        }
        .upload-area.dragover {
            border-color: #667eea;
            background: #f0f0ff;
        }
        
        /* 登录表单 */
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
        }
        
        .form-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 14px;
            transition: border-color 0.3s;
            box-sizing: border-box;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .login-submit-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        .login-submit-btn:hover {
            transform: translateY(-2px);
        }
        
        .login-submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .error-message {
            color: #f44336;
            text-align: center;
            margin-top: 15px;
            display: none;
        }
        
        .login-modal-content {
            max-width: 400px;
        }
    </style>
</head>
<body>
    <header class="navbar">
        <div class="navbar-content">
            <h1 class="navbar-title">党建小助手</h1>
            <div class="navbar-actions">
                <button class="navbar-btn" id="loginBtn" style="display: none;">登录</button>
                <div class="user-info" id="userInfo" style="display: none;">
                    <span id="usernameDisplay"></span>
                    <div class="menu-dropdown">
                        <button class="navbar-btn" id="menuBtn">菜单 ▼</button>
                        <div class="menu-content" id="menuContent">
                            <div class="menu-item" id="viewHistory">查看历史</div>
                            <div class="menu-item" id="exportChat">导出对话</div>
                            <div class="menu-item" id="clearSession">清空会话</div>
                            <div class="menu-item admin-only" id="kbManage" style="display: none;">知识库管理</div>
                            <div class="menu-item admin-only" id="kbReload" style="display: none;">重载知识库</div>
                            <div class="menu-item" id="logoutBtn">退出登录</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </header>
    <main class="chat-container">
        <div class="chat-messages">
            <div class="message ai-message">
                <img src="chatImages/man.png" alt="AI头像" class="avatar" />
                <div class="bubble ai-bubble">
                    <p>你好，我是党建小助手！可以问我关于党建文件、政策解读等问题。</p>
                </div>
            </div>
        </div>
    </main>
    <footer class="input-container">
        <div class="input-wrapper">
            <input type="text" id="inputVal" placeholder="请输入您的问题..." />
            <button type="button" class="send-button">发送</button>
        </div>
    </footer>
    
    <div id="historyModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title">会话历史</h3>
                <span class="close-btn" onclick="closeModal('historyModal')">&times;</span>
            </div>
            <div id="historyContent"></div>
        </div>
    </div>
    
    <div id="kbModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title">知识库管理</h3>
                <span class="close-btn" onclick="closeModal('kbModal')">&times;</span>
            </div>
            <div class="upload-area" id="uploadArea">
                <p>点击或拖拽文件到此处上传</p>
                <input type="file" id="fileInput" style="display: none;" multiple />
            </div>
            <div id="uploadStatus" style="margin-top: 20px;"></div>
        </div>
    </div>
    
    <!-- 登录模态框 -->
    <div id="loginModal" class="modal">
        <div class="modal-content login-modal-content">
            <div class="modal-header">
                <h3 class="modal-title">用户登录</h3>
                <span class="close-btn" onclick="closeModal('loginModal')">&times;</span>
            </div>
            <form id="loginForm">
                <div class="form-group">
                    <label for="loginUsername">用户名</label>
                    <input type="text" id="loginUsername" placeholder="请输入用户名" required />
                </div>
                <div class="form-group">
                    <label for="loginPassword">密码</label>
                    <input type="password" id="loginPassword" placeholder="请输入密码" required />
                </div>
                <button type="submit" class="login-submit-btn" id="loginSubmitBtn">登录</button>
                <div class="error-message" id="loginError"></div>
            </form>
        </div>
    </div>
    
    <script src="chatJs/jquery.min.js"></script>
    <script src="chatJs/auth.js"></script>
    <script src="chatJs/chat.js"></script>
</body>
</html>
