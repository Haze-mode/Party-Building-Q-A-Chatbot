<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,minimum-scale=1,maximum-scale=1,user-scalable=no" />
    <title>知识库管理 - 党建知识问答</title>
    <link rel="stylesheet" type="text/css" href="chatCss/chat.css" />
    <style>
        .kb-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            padding-top: 80px;
        }
        
        .kb-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #eee;
        }
        
        .kb-title {
            font-size: 24px;
            color: #333;
        }
        
        .back-btn {
            background: #C91F37;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.2s;
        }
        
        .back-btn:hover {
            background: #A0182E;
        }
        
        .kb-upload-area {
            border: 2px dashed #ddd;
            border-radius: 8px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 30px;
            background: #fafafa;
        }
        
        .kb-upload-area:hover {
            border-color: #C91F37;
            background: #fff5f5;
        }
        
        .kb-upload-area.dragover {
            border-color: #C91F37;
            background: #fff0f0;
        }
        
        .kb-upload-area p {
            font-size: 16px;
            color: #666;
            margin: 10px 0;
        }
        
        .kb-upload-hint {
            font-size: 14px;
            color: #999;
        }
        
        .kb-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .kb-stat-card {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            text-align: center;
        }
        
        .kb-stat-number {
            font-size: 32px;
            font-weight: bold;
            color: #C91F37;
        }
        
        .kb-stat-label {
            font-size: 14px;
            color: #666;
            margin-top: 5px;
        }
        
        .kb-file-list {
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        
        .kb-file-list-header {
            padding: 15px 20px;
            background: #f5f5f5;
            border-bottom: 1px solid #eee;
            font-weight: bold;
            color: #333;
        }
        
        .kb-file-item {
            padding: 15px 20px;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: background 0.2s;
        }
        
        .kb-file-item:hover {
            background: #fafafa;
        }
        
        .kb-file-item:last-child {
            border-bottom: none;
        }
        
        .kb-file-info {
            flex: 1;
        }
        
        .kb-file-name {
            font-weight: 500;
            color: #333;
            margin-bottom: 5px;
        }
        
        .kb-file-meta {
            font-size: 12px;
            color: #999;
        }
        
        .kb-file-actions {
            display: flex;
            gap: 10px;
        }
        
        .kb-action-btn {
            padding: 6px 12px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s;
        }
        
        .kb-action-btn.edit {
            background: #4CAF50;
            color: white;
        }
        
        .kb-action-btn.edit:hover {
            background: #45a049;
        }
        
        .kb-action-btn.delete {
            background: #f44336;
            color: white;
        }
        
        .kb-action-btn.delete:hover {
            background: #da190b;
        }
        
        .kb-empty {
            padding: 40px;
            text-align: center;
            color: #999;
        }
        
        .upload-progress {
            display: none;
            margin-top: 20px;
            padding: 15px;
            background: #e3f2fd;
            border-radius: 6px;
            color: #1976d2;
        }
        
        .upload-success {
            display: none;
            margin-top: 20px;
            padding: 15px;
            background: #e8f5e9;
            border-radius: 6px;
            color: #388e3c;
        }
        
        .upload-error {
            display: none;
            margin-top: 20px;
            padding: 15px;
            background: #ffebee;
            border-radius: 6px;
            color: #d32f2f;
        }
    </style>
</head>
<body>
    <header class="navbar">
        <div class="navbar-content">
            <h1 class="navbar-title">知识库管理</h1>
        </div>
    </header>
    
    <div class="kb-container">
        <div class="kb-header">
            <h2 class="kb-title">知识库文件管理</h2>
            <button class="back-btn" onclick="window.location.href='index.html'">← 返回聊天</button>
        </div>
        
        <div class="kb-stats">
            <div class="kb-stat-card">
                <div class="kb-stat-number" id="fileCount">0</div>
                <div class="kb-stat-label">文件总数</div>
            </div>
            <div class="kb-stat-card">
                <div class="kb-stat-number" id="kbSize">0 KB</div>
                <div class="kb-stat-label">知识库大小</div>
            </div>
            <div class="kb-stat-card">
                <div class="kb-stat-number" id="lastUpdate">-</div>
                <div class="kb-stat-label">最后更新</div>
            </div>
        </div>
        
        <div class="kb-upload-area" id="uploadArea">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#C91F37" stroke-width="2">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                <polyline points="17 8 12 3 7 8"></polyline>
                <line x1="12" y1="3" x2="12" y2="15"></line>
            </svg>
            <p>点击或拖拽文件到此处上传</p>
            <p class="kb-upload-hint">支持 PDF、Word、TXT 等格式</p>
            <input type="file" id="fileInput" style="display: none;" multiple accept=".pdf,.doc,.docx,.txt,.md" />
        </div>
        
        <div class="upload-progress" id="uploadProgress">
            正在上传文件...
        </div>
        <div class="upload-success" id="uploadSuccess">
            文件上传成功！
        </div>
        <div class="upload-error" id="uploadError">
            文件上传失败，请重试
        </div>
        
        <div class="kb-file-list">
            <div class="kb-file-list-header">已上传文件</div>
            <div id="fileList">
                <div class="kb-empty">暂无文件，请上传知识库文件</div>
            </div>
        </div>
    </div>
    
    <script src="chatJs/jquery.min.js"></script>
    <script src="chatJs/auth.js"></script>
    <script src="chatJs/kb_manager.js"></script>
</body>
</html>
