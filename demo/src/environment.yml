name: py310_chat
channels:
  - https://mirrors.tuna.tsinghua.edu.cn/anaconda/pkgs/main
  - https://mirrors.tuna.tsinghua.edu.cn/anaconda/pkgs/free
  - https://mirrors.tuna.tsinghua.edu.cn/anaconda/cloud/pytorch
  - defaults
dependencies:
  # 基础 Python 和系统库
  - python=3.10
  - pip
  - cudatoolkit=12.1  # 如果你的显卡驱动较老，可改为 11.8 或删除此行让系统自动适配
  - libgcc-ng
  - libgomp
  - libstdcxx-ng
  - openssl
  - zlib
  
  # 核心 Python 库 (通过 Conda 安装以保证二进制兼容性)
  - numpy=1.26.4
  - pandas=2.2.2
  - pytorch=2.3.1
  - torchvision=0.18.1
  - torchaudio=2.3.1
  - scipy=1.14.0
  - scikit-learn=1.5.1
  
